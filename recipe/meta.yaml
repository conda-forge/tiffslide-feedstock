{% set name = "tiffslide" %}
{% set version = "3.0.0" %}
{% set python_min = "3.11" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: d54ac1ca1d03989026da7762d8ff72a59eefd4c66fbcd9321a1293940e3037c4

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools-scm
    - setuptools
  run:
    - fsspec >=2024.10.0
    - imagecodecs
    - pillow >=9.1.0
    - python >={{ python_min }}
    - tifffile >=2025.5.21
    - typing-extensions >=4.0
    - zarr >=3.0,<4.0

test:
  imports:
    - tiffslide
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/bayer-science-for-a-better-life/tiffslide
  summary: A drop-in replacement for openslide-python.
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - ap--
    - sarthakpati
    - sdvillal
